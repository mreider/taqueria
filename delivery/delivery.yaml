
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery
spec:
  selector:
    matchLabels:
      app: delivery
  template:
    metadata:
      labels:
        app: delivery
      annotations:
        oneagent.dynatrace.com/inject: "false"
    spec:
      containers:
        - name: delivery
          image: mreider/taqueria-delivery
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          env:
            - name: app
              value: "k8s"
            - name: FLASK_ENV
              value: production
            - name: dt_token
              valueFrom:
                secretKeyRef:
                  name: taqueria
                  key: dttoken
            - name: dt_metrics_endpoint
              valueFrom:
                configMapKeyRef:
                  name: taqueria
                  key: dt_metrics_endpoint
            - name: dt_traces_endpoint
              valueFrom:
                configMapKeyRef:
                  name: taqueria
                  key: dt_traces_endpoint
---
apiVersion: v1
kind: Service
metadata:
  name: delivery
spec:
  selector:
    app: delivery
  ports:
    - protocol: "TCP"
      port: 5003
      targetPort: 5003