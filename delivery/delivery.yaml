
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery
spec:
  selector:
    matchLabels:
      app: delivery
  template:
    metadata:
      labels:
        app: delivery
      annotations:
        oneagent.dynatrace.com/inject: "false"
    spec:
      containers:
        - name: delivery
          image: mreider/taqueria-delivery
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          env:
            - name: app
              value: "k8s"
---
apiVersion: v1
kind: Service
metadata:
  name: delivery
spec:
  selector:
    app: delivery
  ports:
    - protocol: "TCP"
      port: 5003
      targetPort: 5003